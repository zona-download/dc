<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Parallel Space - Droid Ciyus</title>

  <style>
    :root {
      --bg: #f2f4f8;
      --card: rgba(255,255,255,0.78);
      --text: #111827;
      --muted: #6b7280;
      --accent1: #007BFF;
      --accent2: #0056b3;
      --shadow: 0 10px 30px rgba(0,0,0,0.10);
    }

    [data-theme="dark"] {
      --bg: #050b17;
      --card: rgba(17,24,39,0.70);
      --text: #f3f4f6;
      --muted: #9ca3af;
      --accent1: #3b82f6;
      --accent2: #2563eb;
      --shadow: 0 10px 30px rgba(0,0,0,0.35);
    }

    * {
      box-sizing: border-box;
      font-family: Inter, system-ui, Arial, sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: var(--bg);
      color: var(--text);
      padding: 20px;
      user-select: none;
    }

    .card {
      width: 100%;
      max-width: 360px;
      background: var(--card);
      backdrop-filter: blur(16px);
      border-radius: 22px;
      padding: 30px 24px;
      text-align: center;
      box-shadow: var(--shadow);
    }

    h1 {
      margin: 0;
      font-size: 1.7rem;
      font-weight: 800;
    }

    .info {
      margin-top: 12px;
      font-size: 0.96rem;
      line-height: 1.6;
      color: var(--muted);
    }

    .btn {
      margin-top: 24px;
      width: 100%;
      border: none;
      border-radius: 14px;
      padding: 14px;
      font-size: 1rem;
      font-weight: 700;
      color: white;
      cursor: pointer;
      background: linear-gradient(135deg, var(--accent1), var(--accent2));
      box-shadow: 0 5px 18px rgba(37,99,235,0.35);
      transition: 0.2s;
    }

    .btn:hover {
      transform: translateY(-2px);
      opacity: 0.95;
    }

    #toggleTheme {
      position: fixed;
      bottom: 18px;
      right: 18px;
      width: 48px;
      height: 48px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--card);
      backdrop-filter: blur(12px);
      box-shadow: var(--shadow);
      cursor: pointer;
      font-size: 1.1rem;
    }

    @media (max-width: 480px) {
      .card {
        max-width: 100%;
        padding: 28px 20px;
      }

      h1 {
        font-size: 1.5rem;
      }

      .info {
        font-size: 0.92rem;
      }
    }
  </style>
</head>

<body>

  <div class="card">
    <h1>Parallel Space</h1>

    <p class="info">
      Aplikasi untuk menjalankan clone aplikasi dan multi akun Android dengan ringan dan stabil.
    </p>

    <button class="https://zona-download.github.io/dc/ps/a9" id="downloadBtn">
      Download
    </button>
  </div>

  <div id="toggleTheme">🌙</div>

  <script>
    const toggle = document.getElementById("toggleTheme");

    // Load theme
    const savedTheme = localStorage.getItem("theme");

    if (savedTheme === "dark") {
      document.documentElement.setAttribute("data-theme", "dark");
      toggle.textContent = "☀️";
    }

    // Toggle theme
    toggle.addEventListener("click", () => {
      const isDark = document.documentElement.getAttribute("data-theme") === "dark";

      if (isDark) {
        document.documentElement.removeAttribute("data-theme");
        localStorage.setItem("theme", "light");
        toggle.textContent = "🌙";
      } else {
        document.documentElement.setAttribute("data-theme", "dark");
        localStorage.setItem("theme", "dark");
        toggle.textContent = "☀️";
      }
    });

    // Disable inspect basic
    document.addEventListener("contextmenu", e => e.preventDefault());
    document.addEventListener("copy", e => e.preventDefault());
  </script>

</body>
</html>
